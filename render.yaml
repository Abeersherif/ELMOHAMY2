services:
  # Backend API Service
  - type: web
    name: mohamy-api
    env: python
    plan: standard           # 2 GB RAM; required for disks
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: uvicorn mohamy:app --host 0.0.0.0 --port $PORT
    disk:
      name: mohamy-data
      mountPath: /data       # law DB + chat history live here, survive redeploys
      sizeGB: 2
    envVars:
      - key: GOOGLE_API_KEY
        sync: false          # set on Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DB_PATH
        value: /data/law_database.db
      - key: RUNTIME_DB_PATH
        value: /data/mohamy_runtime.db
      # Skip LFS during git clone — the real DB lives on the /data disk
      # so we never need to materialize the LFS pointer at checkout time.
      # Saves 1.4 GB of LFS bandwidth per deploy and avoids quota errors.
      - key: GIT_LFS_SKIP_SMUDGE
        value: "1"
    
  # Static Frontend (Angular built files)
  - type: web
    name: mohamy-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist/mahami-masry/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
