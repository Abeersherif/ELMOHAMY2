services:
  # Backend API Service
  - type: web
    name: mohamy-api
    env: python
    buildCommand: mkdir -p bin && curl -L https://github.com/git-lfs/git-lfs/releases/download/v3.4.0/git-lfs-linux-amd64-v3.4.0.tar.gz | tar -xz -C bin && ./bin/git-lfs install && ./bin/git-lfs pull && pip install -r requirements.txt
    startCommand: uvicorn mohamy:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false  # You'll set this manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
    
  # Static Frontend (Angular built files)
  - type: web
    name: mohamy-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist/mohamy-masry/browser
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
