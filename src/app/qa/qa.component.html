<div class="w-full max-w-5xl mx-auto bg-slate-900/70 rounded-2xl shadow-2xl border border-slate-800 p-5 text-slate-50">
  <div class="flex justify-between items-center mb-3">
    <div class="flex-grow"></div>
    
    <h2 class="text-2xl font-semibold text-right">
      اسأل المحامي المصري
    </h2>
  </div>

  <div class="grid gap-4 lg:grid-rows-[1fr_auto] min-h-[430px]">
    
    <div
      class="chat-container border border-slate-700 rounded-xl h-72 lg:h-80 overflow-y-auto p-3 bg-slate-900/70 space-y-2">
      <div *ngFor="let message of chatHistory" [ngClass]="message.sender === 'user' ? 'text-right' : 'text-left'">
        <div
          [ngClass]="message.sender === 'user'
            ? 'inline-block px-3 py-2 rounded-2xl bg-blue-600 text-white shadow-sm max-w-[80%] whitespace-pre-line'
            : 'inline-block px-3 py-2 rounded-2xl bg-slate-200 text-slate-900 shadow-sm max-w-[80%] whitespace-pre-line text-right'"
          dir="rtl">
          <span [innerHTML]="message.text"></span>
        </div>
      </div>

      <div *ngIf="chatHistory.length === 0" class="text-center text-slate-500 mt-6 text-sm">
        اكتب سؤالك القانوني في الأسفل، وسيقوم النظام بتمريره إلى الوكلاء (التحليل – الاسترجاع – الإجابة).
      </div>

      
      <div *ngIf="clarificationOptions.length > 0" class="mt-4 flex flex-wrap gap-2 justify-start" dir="rtl">
        <button *ngFor="let opt of clarificationOptions" (click)="chooseOption(opt)"
          class="px-3 py-1 rounded-full border border-slate-500 bg-slate-100 text-slate-900 text-sm hover:bg-blue-100 hover:text-blue-900 transition-colors">
          {{ opt }}
        </button>
      </div>

      
      <div *ngIf="relatedTopics && relatedTopics.length > 0" class="mt-4 space-y-2" dir="rtl">
        <div class="text-xs text-slate-300 text-right">
          مواضيع ذات صلة:
        </div>
        <div class="flex flex-wrap gap-2 justify-start">
          <button *ngFor="let topic of relatedTopics" (click)="chooseOption(topic)" class="px-3 py-1 rounded-full border border-blue-500/70 bg-slate-900 text-blue-200 text-xs
                   hover:bg-blue-600/20 hover:text-blue-100 transition-colors">
            {{ topic }}
          </button>
        </div>
      </div>
    </div>

    
    <div class="border border-slate-700 rounded-xl bg-slate-900/80 p-3 space-y-3">
      <label class="block text-sm text-slate-300 text-right mb-1">
        صياغة السؤال القانوني
      </label>
      <textarea [(ngModel)]="userInput" (keypress)="onKeyPress($event)" rows="4" class="w-full rounded-xl border border-slate-700 bg-slate-950/80 px-3 py-2
               focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500
               text-sm resize-none"
        placeholder="مثال: ما هي الخطوات القانونية الصحيحة لفسخ عقد الإيجار في مصر؟"></textarea>

      <div class="flex justify-between items-center gap-3" dir="rtl">

        
        <button (click)="startVoiceRecognition()"
          class="px-4 py-2 rounded-xl transition-all duration-200 ease-out shadow-md hover:shadow-lg transform hover:-translate-y-[1px] flex items-center gap-2"
          [ngClass]="isRecording ? 'bg-red-600 text-white animate-pulse' : 'bg-slate-700 text-slate-200 hover:bg-slate-600'">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd"
              d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4zm4 10.93A7.001 7.001 0 0017 8a1 1 0 10-2 0A5 5 0 015 8a1 1 0 00-2 0 7.001 7.001 0 006 6.93V17H6a1 1 0 100 2h8a1 1 0 100-2h-3v-2.07z"
              clip-rule="evenodd" />
          </svg>
          <span *ngIf="isRecording">جاري الاستماع...</span>
          <span *ngIf="!isRecording">تحدث</span>
        </button>

        
        <button (click)="toggleBrowseModal()" class="px-3 py-2 rounded-xl bg-purple-600 text-white font-medium
         hover:bg-purple-500 active:bg-purple-700
         transition-all duration-200 ease-out
         shadow-md hover:shadow-lg transform hover:-translate-y-[1px] flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
          </svg>
          تصفح
        </button>

        
        <input type="file" #fileInput (change)="onFileSelected($event)" accept=".txt,.png,.jpg,.jpeg,.pdf"
          style="display: none">

        
        <button (click)="fileInput.click()" class="px-4 py-2 rounded-xl bg-green-600 text-white font-medium
                       hover:bg-green-500 active:bg-green-700
                       transition-all duration-200 ease-out
                       shadow-md hover:shadow-lg transform hover:-translate-y-[1px] flex items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd"
              d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z"
              clip-rule="evenodd" />
          </svg>
          رفع مستند
        </button>

        <button (click)="sendMessage()" class="px-6 py-2 rounded-xl bg-blue-600 text-white font-medium
                 hover:bg-blue-500 active:bg-blue-700
                 transition-all duration-200 ease-out
                 shadow-md hover:shadow-lg transform hover:-translate-y-[1px]" style="direction: ltr;">
          إرسال السؤال
        </button>
      </div>
    </div>
  </div>
</div>

<div *ngIf="showBrowseModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm"
  (click)="closeBrowseModal()">
  <div
    class="bg-slate-900 border border-slate-700 rounded-2xl w-full max-w-4xl h-[80vh] flex flex-col shadow-2xl overflow-hidden"
    (click)="$event.stopPropagation()">
    <div class="flex justify-between items-center p-4 border-b border-slate-700 bg-slate-800/50">
      <button (click)="closeBrowseModal()" class="text-slate-400 hover:text-white"><svg
          xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg></button>
      <h3 class="text-xl font-bold text-white">تصفح القوانين المصرية</h3>
    </div>
    <div class="flex-1 overflow-y-auto p-6" dir="rtl">
      <div *ngIf="isLoadingCategories" class="flex justify-center items-center h-full">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
      </div>
      <div *ngIf="!isLoadingCategories && lawCategories.length > 0" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div *ngFor="let cat of lawCategories"
          class="bg-slate-800/50 rounded-xl p-4 border border-slate-700 hover:border-blue-500/50 transition-colors">
          <div class="flex justify-between items-center mb-3 border-b border-slate-700 pb-2"><span
              class="text-xs bg-blue-900/50 text-blue-200 px-2 py-1 rounded-full">{{ cat.count }} قانون</span>
            <h4 class="text-lg font-bold text-blue-400">{{ cat.name }}</h4>
          </div>
          <ul class="space-y-1 max-h-40 overflow-y-auto custom-scrollbar">
            <li *ngFor="let law of cat.laws" class="text-sm text-slate-300 hover:text-white flex items-center gap-2">
              <span class="w-1.5 h-1.5 rounded-full bg-slate-600"></span>{{ law }}</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>
